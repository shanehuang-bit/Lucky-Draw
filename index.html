<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽、機車抽籤 - 終極相容除錯版</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --thai-red: #C8102E;
            --dark-blue: #00247D;
            --bg-color: #fcfaf2;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            color: #333;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            border-top: 12px solid var(--primary-gold);
            text-align: center;
        }

        h1 { color: var(--thai-red); font-size: 2.2rem; margin-bottom: 5px; letter-spacing: 2px; }
        .info { color: #888; margin-bottom: 25px; font-size: 0.95rem; }

        /* 設定區 */
        .setup-section {
            background: #fcfcfc;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .setup-row {
            margin-bottom: 15px;
        }
        .setup-row label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #444;
        }

        .upload-box {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            border: 2px dashed #ccc;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            box-sizing: border-box;
            resize: vertical;
        }

        /* 獎項表單 */
        .prize-form {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .prize-form input[type="text"] {
            flex: 2;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .prize-form input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add-prize, .btn-import-text {
            background: var(--dark-blue);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .btn-add-prize:hover, .btn-import-text:hover { background: #001a5c; }

        /* 跑馬燈 */
        .display-area {
            background: #1a1a1a;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 800;
            color: #fff;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 6px solid var(--primary-gold);
            text-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        .active { animation: blink 0.1s infinite; color: var(--primary-gold); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 20px 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { color: var(--primary-gold); font-size: 1.1rem; border-bottom: 2px solid #eee; }

        .btn-draw {
            padding: 12px 25px;
            background: var(--thai-red);
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 0 #8a0b1f;
        }

        .btn-draw:hover { background: #a00d25; transform: translateY(-2px); }
        .btn-draw:active { transform: translateY(2px); box-shadow: none; }
        .btn-draw:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        .btn-delete-prize {
            padding: 5px 10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .btn-delete-prize:hover { background: #cc0000; }

        /* 得獎標籤 */
        .winner-tag {
            display: inline-flex;
            align-items: center;
            background: var(--dark-blue);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            margin: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0, 36, 125, 0.2);
        }

        .delete-btn {
            margin-left: 12px;
            color: #ffaaaa;
            cursor: pointer;
            font-size: 1rem;
            width: 22px;
            height: 22px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
        }
        .delete-btn:hover { background: #ff4444; color: white; }

        /* 系統除錯檢視區 */
        .debug-panel {
            margin-top: 30px;
            background: #eee;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            text-align: left;
            font-size: 0.85rem;
            color: #555;
        }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 汽、機車抽籤 🛵</h1>
    <div class="info" id="statusInfo">狀態：嚴格不重複公平抽獎</div>

    <div class="setup-section">
        <div class="setup-row">
            <label>步驟一：輸入抽籤名單（二選一）</label>
            
            <div class="upload-box">
                <span style="font-size: 0.85rem; color:#666; display:block; margin-bottom: 5px;">方法 A：選擇電腦裡的記事本 (.txt) 檔案</span>
                <input type="file" id="fileInput" accept=".txt">
            </div>

            <div style="background: #fcfcfc; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                <span style="font-size: 0.85rem; color:#666; display:block; margin-bottom: 5px;">方法 B：直接將名單複製並貼在下方（每行一個人名）</span>
                <textarea id="textInput" placeholder="請在此貼上名單...例如：&#10;王大明&#10;李小美&#10;張三"></textarea>
                <button type="button" class="btn-import-text" onclick="importFromTextArea()" style="margin-top: 8px;">確認匯入文字名單</button>
            </div>
        </div>

        <div class="setup-row" style="border-top: 1px solid #eee; padding-top: 15px;">
            <label>步驟二：設定獎項內容</label>
            <div class="prize-form">
                <input type="text" id="newPrizeName" placeholder="例如：三獎：一般汽車位">
                <input type="number" id="newPrizeTotal" placeholder="名額" min="1" value="1">
                <button type="button" class="btn-add-prize" onclick="addCustomPrize()">新增此獎項</button>
            </div>
        </div>
    </div>

    <div id="display" class="display-area">請先匯入名單</div>

    <table>
        <thead>
            <tr>
                <th style="width: 40%;">獎項項目</th>
                <th style="width: 40%;">得獎名單</th>
                <th style="width: 20%;">操作</th>
            </tr>
        </thead>
        <tbody id="prizeTableBody"></tbody>
    </table>

    <div class="debug-panel">
        <strong style="color: #333;">⚙️ 系統狀態診斷器：</strong>
        <div id="debugLog">系統已加載。請匯入名單或嘗試點擊「新增此獎項」。</div>
    </div>
</div>

<script>
    // 預設基礎獎項
    let prizeConfig = [
        { id: 'p1', name: "特等汽車位", total: 1, winners: [] },
        { id: 'p2', name: "一等機車位", total: 2, winners: [] }
    ];

    let candidateList = []; // 儲存由記事本讀入的名單
    let usedNumbers = new Set(); // 已中獎的名單

    // 常用 DOM
    let display, fileInput, statusInfo, debugLog;

    // 寫入除錯紀錄的輔助函式
    function writeLog(msg) {
        if (debugLog) {
            debugLog.innerHTML += "<br>⚡ " + msg;
        } else {
            console.log(msg);
        }
    }

    // 確保 DOM 載入後才執行，防止 null 指標
    window.onload = function() {
        try {
            display = document.getElementById('display');
            fileInput = document.getElementById('fileInput');
            statusInfo = document.getElementById('statusInfo');
            debugLog = document.getElementById('debugLog');

            writeLog("網頁初始化成功。預設獎項載入完成。");
            
            // 綁定檔案上傳事件
            if (fileInput) {
                fileInput.addEventListener('change', handleFileImport);
                writeLog("檔案上傳接聽程式已成功綁定。");
            }

            renderTable();
        } catch (e) {
            alert("初始化發生錯誤：" + e.message);
        }
    };

    // 方法 A：處理檔案匯入
    function handleFileImport(e) {
        writeLog("偵測到檔案變更...");
        const file = e.target.files[0];
        if (!file) {
            writeLog("未選取任何檔案。");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const content = event.target.result;
                processRawText(content);
                writeLog(`檔案讀取成功！共分析出 ${candidateList.length} 筆名單。`);
            } catch (err) {
                writeLog("讀取檔案出錯：" + err.message);
                alert("讀取檔案失敗：" + err.message);
            }
        };
        reader.onerror = function() {
            writeLog("FileReader 發生錯誤。");
        };
        
        // 使用萬用 UTF-8 讀取
        reader.readAsText(file, 'UTF-8');
    }

    // 方法 B：從文字框匯入
    function importFromTextArea() {
        writeLog("正在從文字輸入框匯入名單...");
        const textarea = document.getElementById('textInput');
        if (!textarea) {
            writeLog("找不到文字輸入框 DOM。");
            return;
        }
        
        const content = textarea.value;
        if (!content.trim()) {
            alert("請先在輸入框內貼上您的名單！");
            writeLog("輸入框為空。");
            return;
        }

        processRawText(content);
        writeLog(`手動貼上匯入成功！共解析出 ${candidateList.length} 筆名單。`);
        alert(`成功匯入 ${candidateList.length} 筆名單！`);
    }

    // 統一解析文字名單的函式
    function processRawText(rawText) {
        candidateList = rawText.split(/\r?\n/)
                               .map(line => line.trim())
                               .filter(line => line.length > 0);
        
        if (candidateList.length === 0) {
            display.innerText = "請重新匯入名單";
            statusInfo.innerText = "名單為空";
            return;
        }

        // 重設抽籤進度
        usedNumbers.clear();
        prizeConfig.forEach(p => p.winners = []);
        
        statusInfo.innerText = `已匯入名單共：${candidateList.length} 筆 | 狀態：嚴格不重複公平抽獎`;
        display.innerText = "名單匯入成功，可以開始抽籤";
        renderTable();
    }

    // 渲染獎項表格
    function renderTable() {
        try {
            const tbody = document.getElementById('prizeTableBody');
            if (!tbody) {
                writeLog("找不到表格主體 (prizeTableBody) DOM 節點。");
                return;
            }

            if (prizeConfig.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999;">目前無任何獎項，請於上方欄位新增獎項！</td></tr>`;
                return;
            }

            tbody.innerHTML = prizeConfig.map(p => {
                const total = Number(p.total);
                const currentWinners = p.winners ? p.winners.length : 0;
                const isWinnerFull = currentWinners >= total;
                const isNoList = candidateList.length === 0;

                return `
                    <tr>
                        <td>
                            <strong>${p.name}</strong><br>
                            <small style="color:#888">名額：${total}</small><br>
                            <button type="button" class="btn-delete-prize" onclick="deletePrize('${p.id}')">刪除此獎項</button>
                        </td>
                        <td>
                            ${(p.winners || []).map(num => `
                                <span class="winner-tag">
                                    ${num}
                                    <span class="delete-btn" onclick="removeWinner('${p.id}', '${num}')" title="重抽此名額">✕</span>
                                </span>
                            `).join('')}
                        </td>
                        <td>
                            <button type="button" class="btn-draw" id="btn-${p.id}" 
                                    onclick="handleDraw('${p.id}')" 
                                    ${isWinnerFull || isNoList ? 'disabled' : ''}>
                                ${isNoList ? '請先匯入名單' : (isWinnerFull ? '已滿額' : '開始抽取')}
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
            writeLog("表格渲染（Render）成功。");
        } catch (err) {
            writeLog("表格渲染發生崩潰：" + err.message);
        }
    }

    // 新增自訂獎項
    function addCustomPrize() {
        try {
            writeLog("正在點擊新增獎項...");
            const nameInput = document.getElementById('newPrizeName');
            const totalInput = document.getElementById('newPrizeTotal');

            if (!nameInput || !totalInput) {
                writeLog("找不到新增欄位的 DOM 元素。");
                return;
            }

            const name = nameInput.value.trim();
            const total = parseInt(totalInput.value, 10);

            if (!name) {
                alert("請輸入獎項名稱！");
                writeLog("新增失敗：未輸入獎項名稱。");
                return;
            }
            if (isNaN(total) || total <= 0) {
                alert("名額必須是正整數（大於0）！");
                writeLog("新增失敗：名額格式不對。");
                return;
            }

            const newId = 'p_' + Date.now();
            prizeConfig.push({
                id: newId,
                name: name,
                total: total,
                winners: []
            });

            writeLog(`成功新增獎項：[${name}]，名額 ${total} 位。`);

            // 清空輸入欄位
            nameInput.value = '';
            totalInput.value = '1';

            renderTable();
        } catch (err) {
            writeLog("新增獎項發生錯誤：" + err.message);
            alert("新增失敗，錯誤回報：" + err.message);
        }
    }

    // 刪除自訂獎項
    function deletePrize(prize
