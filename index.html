<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽、機車抽籤 - 終極穩定版</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --thai-red: #C8102E;
            --dark-blue: #00247D;
            --bg-color: #fcfaf2;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            color: #333;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            border-top: 12px solid var(--primary-gold);
            text-align: center;
        }

        h1 { color: var(--thai-red); font-size: 2.2rem; margin-bottom: 5px; letter-spacing: 2px; }
        .info { color: #888; margin-bottom: 25px; font-size: 0.95rem; }

        /* 設定區 */
        .setup-section {
            background: #fcfcfc;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .setup-row {
            margin-bottom: 15px;
        }
        .setup-row label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #444;
        }

        .upload-box {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            border: 2px dashed #ccc;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            box-sizing: border-box;
            resize: vertical;
        }

        /* 獎項表單 */
        .prize-form {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .prize-form input[type="text"] {
            flex: 2;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .prize-form input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add-prize, .btn-import-text {
            background: var(--dark-blue);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .btn-add-prize:hover, .btn-import-text:hover { background: #001a5c; }

        /* 跑馬燈 */
        .display-area {
            background: #1a1a1a;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 800;
            color: #fff;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 6px solid var(--primary-gold);
            text-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        .active { animation: blink 0.1s infinite; color: var(--primary-gold); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 20px 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { color: var(--primary-gold); font-size: 1.1rem; border-bottom: 2px solid #eee; }

        .btn-draw {
            padding: 12px 25px;
            background: var(--thai-red);
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 0 #8a0b1f;
        }

        .btn-draw:hover { background: #a00d25; transform: translateY(-2px); }
        .btn-draw:active { transform: translateY(2px); box-shadow: none; }
        .btn-draw:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        .btn-delete-prize {
            padding: 5px 10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .btn-delete-prize:hover { background: #cc0000; }

        /* 得獎標籤 */
        .winner-tag {
            display: inline-flex;
            align-items: center;
            background: var(--dark-blue);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            margin: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0, 36, 125, 0.2);
        }

        .delete-btn {
            margin-left: 12px;
            color: #ffaaaa;
            cursor: pointer;
            font-size: 1rem;
            width: 22px;
            height: 22px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
        }
        .delete-btn:hover { background: #ff4444; color: white; }

        /* 系統除錯檢視區 */
        .debug-panel {
            margin-top: 30px;
            background: #eee;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            text-align: left;
            font-size: 0.85rem;
            color: #555;
        }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 汽、機車抽籤 🛵</h1>
    <div class="info" id="statusInfo">狀態：嚴格不重複公平抽獎</div>

    <div class="setup-section">
        <div class="setup-row">
            <label>步驟一：輸入抽籤名單（二選一）</label>
            
            <div class="upload-box">
                <span style="font-size: 0.85rem; color:#666; display:block; margin-bottom: 5px;">方法 A：選擇電腦裡的記事本 (.txt) 檔案</span>
                <input type="file" id="fileInput" accept=".txt">
            </div>

            <div style="background: #fcfcfc; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                <span style="font-size: 0.85rem; color:#666; display:block; margin-bottom: 5px;">方法 B：直接將名單複製並貼在下方（每行一個人名）</span>
                <textarea id="textInput" placeholder="請在此貼上名單...例如：&#10;王大明&#10;李小美&#10;張三"></textarea>
                <button type="button" class="btn-import-text" onclick="importFromTextArea()" style="margin-top: 8px;">確認匯入文字名單</button>
            </div>
        </div>

        <div class="setup-row" style="border-top: 1px solid #eee; padding-top: 15px;">
            <label>步驟二：設定獎項內容</label>
            <div class="prize-form">
                <input type="text" id="newPrizeName" placeholder="例如：三獎：一般汽車位">
                <input type="number" id="newPrizeTotal" placeholder="名額" min="1" value="1">
                <button type="button" class="btn-add-prize" onclick="addCustomPrize()">新增此獎項</button>
            </div>
        </div>
    </div>

    <div id="display" class="display-area">請先匯入名單</div>

    <table>
        <thead>
            <tr>
                <th style="width: 40%;">獎項項目</th>
                <th style="width: 40%;">得獎名單</th>
                <th style="width: 20%;">操作</th>
            </tr>
        </thead>
        <tbody id="prizeTableBody"></tbody>
    </table>

    <div class="debug-panel">
        <strong style="color: #333;">⚙️ 系統狀態診斷器：</strong>
        <div id="debugLog">系統載入中...</div>
    </div>
</div>

<script>
    // 使用最穩定的全域變數宣告，避免 ES6 語法不相容
    var prizeConfig = [
        { id: 'p1', name: "特等汽車位", total: 1, winners: [] },
        { id: 'p2', name: "一等機車位", total: 2, winners: [] }
    ];
    var candidateList = []; 
    var usedNumbers = new Set(); 

    var display = document.getElementById('display');
    var fileInput = document.getElementById('fileInput');
    var statusInfo = document.getElementById('statusInfo');
    var debugLog = document.getElementById('debugLog');

    function writeLog(msg) {
        console.log(msg);
        if (debugLog) {
            debugLog.innerHTML += "<div>⚡ " + msg + "</div>";
        }
    }

    // 初始化網頁與綁定檔案上傳監聽
    try {
        if (debugLog) debugLog.innerHTML = ""; // 清除初始文字
        writeLog("腳本完全載入成功！");
        
        if (fileInput) {
            fileInput.onchange = function(e) {
                writeLog("偵測到選擇檔案變更！開始讀取...");
                var file = e.target.files[0];
                if (!file) return;

                var reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        processRawText(evt.target.result);
                        writeLog("檔案名單匯入成功！共 " + candidateList.length + " 筆名單。");
                    } catch(err) {
                        writeLog("解析檔案錯誤: " + err.message);
                    }
                };
                reader.readAsText(file, 'UTF-8');
            };
            writeLog("檔案上傳事件已完成綁定。");
        }
        
        renderTable();
        writeLog("預設表格渲染完成，系統就緒。");
    } catch(e) {
        alert("初始化發生致命錯誤: " + e.message);
    }

    // 處理手動輸入框名單匯入
    function importFromTextArea() {
        writeLog("點擊『確認匯入文字名單』按鈕。");
        var textarea = document.getElementById('textInput');
        if (!textarea) {
            writeLog("錯誤：找不到文字框 textInput 節點！");
            return;
        }
        var val = textarea.value;
        if (!val.trim()) {
            alert("請先在下方輸入框內貼上您的名單！");
            writeLog("匯入中止：文字框為空。");
            return;
        }
        try {
            processRawText(val);
            writeLog("輸入框名單匯入成功！共 " + candidateList.length + " 筆。");
            alert("成功匯入 " + candidateList.length + " 筆名單！");
        } catch(err) {
            writeLog("解析文字框錯誤: " + err.message);
        }
    }

    // 統一解析文字內容
    function processRawText(rawText) {
        var tempLines = rawText.split('\n');
        candidateList = [];
        for (var i = 0; i < tempLines.length; i++) {
            var line = tempLines[i].trim();
            if (line.length > 0) {
                candidateList.push(line);
            }
        }
        
        usedNumbers.clear();
        for (var j = 0; j < prizeConfig.length; j++) {
            prizeConfig[j].winners = [];
        }
        
        if (statusInfo) {
            statusInfo.innerText = "已匯入名單共：" + candidateList.length + " 筆 | 狀態：嚴格不重複公平抽獎";
        }
        if (display) {
            display.innerText = "名單匯入成功，可以開始抽籤";
        }
        renderTable();
    }

    // 渲染獎項表格 (不使用箭頭函式)
    function renderTable() {
        var tbody = document.getElementById('prizeTableBody');
        if (!tbody) return;
        
        if (prizeConfig.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">目前無任何獎項，請於上方欄位新增獎項！</td></tr>';
            return;
        }

        var html = '';
        for (var i = 0; i < prizeConfig.length; i++) {
            var p = prizeConfig[i];
            
            // 處理得獎人標籤
            var winnersHtml = '';
            for (var w = 0; w < p.winners.length; w++) {
                var name = p.winners[w];
                winnersHtml += '<span class="winner-tag">' + name + 
                               '<span class="delete-btn" onclick="removeWinner(\'' + p.id + '\', \'' + name + '\')">✕</span></span>';
            }
            
            var isFull = p.winners.length >= p.total;
            var isDisabled = isFull || candidateList.length === 0;
            var btnText = candidateList.length === 0 ? '請先匯入名單' : (isFull ? '已滿額' : '開始抽取');

            html += '<tr>' +
                    '<td><strong>' + p.name + '</strong><br><small style="color:#888">名額：' + p.total + '</small><br><button type="button" class="btn-delete-prize" onclick="deletePrize(\'' + p.id + '\')">刪除此獎項</button></td>' +
                    '<td>' + winnersHtml + '</td>' +
                    '<td><button type="button" class="btn-draw" id="btn-' + p.id + '" onclick="handleDraw(\'' + p.id + '\')" ' + (isDisabled ? 'disabled' : '') + '>' + btnText + '</button></td>' +
                    '</tr>';
        }
        tbody.innerHTML = html;
    }

    // 新增自訂獎項
    function addCustomPrize() {
        writeLog("點擊『新增此獎項』按鈕。");
        var nameInput = document.getElementById('newPrizeName');
        var totalInput = document.getElementById('newPrizeTotal');
        
        if (!nameInput || !totalInput) {
            writeLog("錯誤：找不到欄位 DOM 節點！");
            return;
        }

        var name = nameInput.value.trim();
        var total = parseInt(totalInput.value, 10);

        if (!name) {
            alert("請輸入獎項名稱！");
            writeLog("新增失敗：名稱為空。");
            return;
        }
        if (isNaN(total) || total <= 0) {
            alert("名額必須大於 0！");
            writeLog("新增失敗：名額非正整數。");
            return;
        }

        prizeConfig.push({
            id: 'p_' + Date.now(),
            name: name,
            total: total,
            winners: []
        });

        writeLog("成功新增獎項：" + name + " (名額: " + total + ")");
        nameInput.value = '';
        totalInput.value = '1';
        renderTable();
    }

    // 刪除自訂獎項
    function deletePrize(id) {
        if (!confirm("確定要刪除這個獎項嗎？此獎項已抽出的得獎人將會釋放回名單中。")) return;
        
        var targetPrize = null;
        for (var i = 0; i < prizeConfig.length; i++) {
            if (prizeConfig[i].id === id) {
                targetPrize = prizeConfig[i];
                break;
            }
        }
        
        if (targetPrize) {
            for (var w = 0; w < targetPrize.winners.length; w++) {
                usedNumbers.delete(targetPrize.winners[w]);
            }
        }

        var tempConfig = [];
        for (var j = 0; j < prizeConfig.length; j++) {
            if (prizeConfig[j].id !== id) {
                tempConfig.push(prizeConfig[j]);
            }
        }
        prizeConfig = tempConfig;
        
        renderTable();
        if (display) display.innerText = "READY";
        writeLog("已刪除一個獎項。");
    }

    // 刪除個別中獎人（重抽）
    function removeWinner(prizeId, name) {
        if (!confirm("確定要取消 [ " + name + " ] 的中獎資格並放回名單中嗎？")) return;
        
        for (var i = 0; i < prizeConfig.length; i++) {
            if (prizeConfig[i].id === prizeId) {
                var tempWinners = [];
                for (var w = 0; w < prizeConfig[i].winners.length; w++) {
                    if (prizeConfig[i].winners[w] !== name) {
                        tempWinners.push(prizeConfig[i].winners[w]);
                    }
                }
                prizeConfig[i].winners = tempWinners;
                break;
            }
        }
        usedNumbers.delete(name);
        renderTable();
        if (display) display.innerText = "READY";
        writeLog("已重置中獎人: " + name);
    }

    // 執行抽籤
    function handleDraw(prizeId) {
        if (candidateList.length === 0) {
            alert("請先上傳名單檔案！");
            return;
        }

        var available = [];
        for (var i = 0; i < candidateList.length; i++) {
            if (!usedNumbers.has(candidateList[i])) {
                available.push(candidateList[i]);
            }
        }

        if (available.length === 0) {
            alert("抽籤池已空！所有人均已中獎。");
            return;
        }

        var btns = document.querySelectorAll('.btn-draw');
        for (var b = 0; b < btns.length; b++) {
            btns[b].disabled = true;
        }
        
        if (display) display.classList.add('active');

        var counter = 0;
        var interval = setInterval(function() {
            var tempIndex = Math.floor(Math.random() * available.length);
            if (display) display.innerText = available[tempIndex];
            counter++;
            
            if (counter > 20) {
                clearInterval(interval);
                
                var finalIndex = Math.floor(Math.random() * available.length);
                var winner = available[finalIndex];
                
                usedNumbers.add(winner);
                
                for (var j = 0; j < prizeConfig.length; j++) {
                    if (prizeConfig[j].id === prizeId) {
                        prizeConfig[j].winners.push(winner);
                        break;
                    }
                }
                
                if (display) {
                    display.innerText = winner;
                    display.classList.remove('active');
                }
                renderTable();
                writeLog("抽出中獎者：" + winner);
            }
        }, 50);
    }
</script>

</body>
</html>
