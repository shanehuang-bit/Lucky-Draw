<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽、機車抽籤 - 公平專業版</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --thai-red: #C8102E;
            --dark-blue: #00247D;
            --bg-color: #fcfaf2;
        }

        body {
            font-family: "SF Pro Display", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            color: #333;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            border-top: 12px solid var(--primary-gold);
            text-align: center;
        }

        h1 { color: var(--thai-red); font-size: 2.2rem; margin-bottom: 5px; letter-spacing: 2px; }
        .info { color: #888; margin-bottom: 25px; font-size: 0.95rem; }

        /* 檔案與獎項設定區 */
        .setup-section {
            background: #fcfcfc;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .setup-row {
            margin-bottom: 15px;
        }
        .setup-row label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #444;
        }

        .upload-box {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            border: 2px dashed #ccc;
        }

        /* 新增獎項表單 */
        .prize-form {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .prize-form input[type="text"] {
            flex: 2;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .prize-form input[type="number"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn-add-prize {
            background: var(--dark-blue);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-add-prize:hover { background: #001a5c; }

        /* 數字/名單顯示區 */
        .display-area {
            background: #1a1a1a;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 800;
            color: #fff;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 6px solid var(--primary-gold);
            text-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        .active { animation: blink 0.1s infinite; color: var(--primary-gold); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 20px 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { color: var(--primary-gold); font-size: 1.1rem; border-bottom: 2px solid #eee; }

        .btn-draw {
            padding: 12px 25px;
            background: var(--thai-red);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 0 #8a0b1f;
        }

        .btn-draw:hover { background: #a00d25; transform: translateY(-2px); }
        .btn-draw:active { transform: translateY(2px); box-shadow: none; }
        .btn-draw:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        .btn-delete-prize {
            padding: 5px 10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .btn-delete-prize:hover { background: #cc0000; }

        /* 得獎標籤 */
        .winner-tag {
            display: inline-flex;
            align-items: center;
            background: var(--dark-blue);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            margin: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0, 36, 125, 0.2);
        }

        .delete-btn {
            margin-left: 12px;
            color: #ffaaaa;
            cursor: pointer;
            font-size: 1rem;
            width: 22px;
            height: 22px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            transition: 0.2s;
        }
        .delete-btn:hover { background: #ff4444; color: white; }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 汽、機車抽籤 🛵</h1>
    <div class="info" id="statusInfo">請先匯入記事本 (.txt) 名單，並設定好您的獎項。 | 狀態：嚴格不重複公平抽獎</div>

    <div class="setup-section">
        <div class="setup-row">
            <label for="fileInput">步驟一：匯入抽籤名單 (.txt)</label>
            <div class="upload-box">
                <input type="file" id="fileInput" accept=".txt">
            </div>
        </div>

        <div class="setup-row">
            <label>步驟二：設定獎項內容</label>
            <div class="prize-form">
                <input type="text" id="newPrizeName" placeholder="例如：一獎：汽車位">
                <input type="number" id="newPrizeTotal" placeholder="名額" min="1" value="1">
                <button class="btn-add-prize" onclick="addCustomPrize()">新增此獎項</button>
            </div>
        </div>
    </div>

    <div id="display" class="display-area">請先匯入名單</div>

    <table>
        <thead>
            <tr>
                <th style="width: 40%;">獎項項目</th>
                <th style="width: 40%;">得獎名單</th>
                <th style="width: 20%;">操作</th>
            </tr>
        </thead>
        <tbody id="prizeTableBody"></tbody>
    </table>
</div>

<script>
    // 預設的基礎獎項，您也可以在畫面上直接新增或刪除
    let prizeConfig = [
        { id: 'p1', name: "特等汽車位", total: 1, winners: [] },
        { id: 'p2', name: "一等機車位", total: 2, winners: [] }
    ];

    let candidateList = []; // 儲存由記事本讀入的名單
    let usedNumbers = new Set(); // 儲存已被抽中的人名
    const display = document.getElementById('display');
    const fileInput = document.getElementById('fileInput');
    const statusInfo = document.getElementById('statusInfo');

    // 自動偵測檔案編碼 (解決 UTF-8 與 ANSI 亂碼問題) 並匯入
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const tempReader = new FileReader();
        tempReader.onload = function(evt) {
            const bytes = new Uint8Array(evt.target.result);
            // 簡單的 UTF-8 偵測機制，若不是 UTF-8 則改用繁體中文 (Big5) 讀取
            let encoding = 'UTF-8';
            let isUtf8 = true;
            for (let i = 0; i < bytes.length; i++) {
                if (bytes[i] > 127) {
                    if ((bytes[i] & 224) === 192) {
                        if (i + 1 >= bytes.length || (bytes[i + 1] & 192) !== 128) { isUtf8 = false; break; }
                        i += 1;
                    } else if ((bytes[i] & 240) === 224) {
                        if (i + 2 >= bytes.length || (bytes[i + 1] & 192) !== 128 || (bytes[i + 2] & 192) !== 128) { isUtf8 = false; break; }
                        i += 2;
                    } else { isUtf8 = false; break; }
                }
            }
            if (!isUtf8) encoding = 'Big5';

            // 正式讀取檔案文字
            const textReader = new FileReader();
            textReader.onload = function(event) {
                const content = event.target.result;
                candidateList = content.split(/\r?\n/)
                                       .map(line => line.trim())
                                       .filter(line => line.length > 0);
                
                if (candidateList.length === 0) {
                    alert("匯入失敗：記事本內無任何有效名單，請確認內容！");
                    display.innerText = "請重新匯入名單";
                    return;
                }

                // 重設狀態
                usedNumbers.clear();
                prizeConfig.forEach(p => p.winners = []);
                
                statusInfo.innerText = `已匯入名單共：${candidateList.length} 筆 | 狀態：嚴格不重複公平抽獎`;
                display.innerText = "名單匯入成功，可以開始抽籤";
                renderTable();
            };
            textReader.readAsText(file, encoding);
        };
        tempReader.readAsArrayBuffer(file);
    });

    // 渲染獎項表格
    function renderTable() {
        const tbody = document.getElementById('prizeTableBody');
        if (prizeConfig.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999;">目前無任何獎項，請於上方欄位新增獎項！</td></tr>`;
            return;
        }

        tbody.innerHTML = prizeConfig.map(p => `
            <tr>
                <td>
                    <strong>${p.name}</strong><br>
